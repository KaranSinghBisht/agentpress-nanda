name: Herald editorial cycle

on:
  schedule:
    # Every 30 minutes: compile pending signals into editions, settle payouts.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  editorial-cycle:
    runs-on: ubuntu-latest
    steps:
      - name: Run one editorial cycle
        run: |
          set -euo pipefail
          curl -sf -X POST "${{ secrets.AGENTPRESS_URL }}/api/editor/compile" \
            -H "x-editor-key: ${{ secrets.EDITOR_KEY }}" \
            -H "content-type: application/json"
